name: Refresh committed market data

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Refresh mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - validate

permissions:
  contents: write

concurrency:
  group: committed-market-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh or validate snapshot
        env:
          REFRESH_MODE: ${{ github.event.inputs.mode || 'incremental' }}
        run: python scripts/refresh_market_data.py --mode "$REFRESH_MODE"

      - name: Validate stored snapshot
        if: ${{ github.event.inputs.mode != 'validate' }}
        run: python scripts/refresh_market_data.py --mode validate

      - name: Commit changed data
        if: ${{ github.event.inputs.mode != 'validate' }}
        run: |
          if git diff --quiet -- data/market_data; then
            echo "No new market data to commit."
            exit 0
          fi
          git config user.name "stock-analyser-data-bot"
          git config user.email "stock-analyser-data-bot@users.noreply.github.com"
          git add data/market_data
          git commit -m "Refresh committed market data $(date -u +%F) [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
