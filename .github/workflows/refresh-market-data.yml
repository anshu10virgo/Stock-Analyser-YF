name: Refresh committed market data

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Refresh mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - classifications
          - validate
          - notification-test
      reference_run_url:
        description: "Optional failed run URL included in a notification test"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: committed-market-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: ${{ github.event.inputs.mode != 'notification-test' }}
        run: python -m pip install -r requirements.txt

      - name: Refresh or validate snapshot
        if: ${{ github.event.inputs.mode != 'notification-test' }}
        env:
          REFRESH_MODE: ${{ github.event.inputs.mode || 'incremental' }}
        run: python scripts/refresh_market_data.py --mode "$REFRESH_MODE"

      - name: Validate stored snapshot
        if: ${{ github.event.inputs.mode != 'validate' && github.event.inputs.mode != 'notification-test' }}
        run: python scripts/refresh_market_data.py --mode validate

      - name: Commit changed data
        if: ${{ github.event.inputs.mode != 'validate' && github.event.inputs.mode != 'notification-test' }}
        run: |
          if git diff --quiet -- data/market_data; then
            echo "No new market data to commit."
            exit 0
          fi
          git config user.name "stock-analyser-data-bot"
          git config user.email "stock-analyser-data-bot@users.noreply.github.com"
          git add data/market_data
          git commit -m "Refresh committed market data $(date -u +%F) [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Email refresh failure
        if: ${{ failure() || github.event.inputs.mode == 'notification-test' }}
        env:
          REFRESH_SMTP_USERNAME: anshu10virgo@gmail.com
          REFRESH_SMTP_APP_PASSWORD: ${{ secrets.REFRESH_SMTP_APP_PASSWORD }}
          REFRESH_ALERT_RECIPIENT: anshu10virgo@gmail.com
          REFRESH_ALERT_IS_TEST: ${{ github.event.inputs.mode == 'notification-test' }}
          REFRESH_ALERT_REFERENCE_RUN_URL: ${{ github.event.inputs.reference_run_url }}
        run: python scripts/send_refresh_failure_email.py
